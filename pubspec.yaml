name: love_assistant
description: Facebook post comment analyzer with ChatGPT sentiment analysis
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  html: ^0.15.4
  webview_windows: ^0.4.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  flutter_facebook_auth: ^7.1.6
  firebase_core: ^4.9.0
  crypto: ^3.0.3
  encrypt: ^5.0.3
  cloud_firestore: ^6.4.1
  webview_flutter: ^4.10.0
  provider: ^6.1.1
  url_launcher: ^6.2.1
  intl: ^0.20.2
  dio: ^5.3.3
  flutter_dotenv: ^6.0.1
  flutter_secure_storage: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env